<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Bank — TestBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .q-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; transition: box-shadow .15s; }
    .q-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    select, input[type="text"] { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="nav"></div>

  <div class="max-w-screen-xl mx-auto px-6 py-10">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Question Bank</h1>
        <p class="text-sm text-slate-500 mt-1" id="totalLabel">Loading…</p>
      </div>
      <div class="flex gap-2">
        <a href="generate.html" class="hidden sm:flex items-center gap-1.5 px-4 py-2 border border-slate-200 text-slate-700 rounded text-sm font-medium hover:bg-slate-50 transition-colors">✦ AI Generate</a>
        <a href="question-form.html" class="flex items-center gap-1.5 px-4 py-2 bg-indigo-700 text-white rounded text-sm font-medium hover:bg-indigo-800 transition-colors">+ Add Question</a>
      </div>
    </div>

    <!-- Search + Filters -->
    <div class="bg-white border border-slate-200 rounded-lg p-4 mb-6">
      <div class="flex gap-2 mb-3">
        <input id="searchInput" type="text" placeholder="Search by title, code, or keyword…"
          class="flex-1 border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400"
          onkeydown="if(event.key==='Enter') loadQuestions()" />
        <button onclick="loadQuestions()" class="px-4 py-2 bg-indigo-700 text-white rounded text-sm font-medium hover:bg-indigo-800 transition-colors">Search</button>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
        <select id="fSubject" onchange="loadQuestions()" class="border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white text-slate-700">
          <option value="">All subjects</option>
        </select>
        <select id="fGrade" onchange="loadQuestions()" class="border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white text-slate-700">
          <option value="">All grades</option>
        </select>
        <select id="fDifficulty" onchange="loadQuestions()" class="border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white text-slate-700">
          <option value="">All difficulties</option>
        </select>
        <select id="fType" onchange="loadQuestions()" class="border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white text-slate-700">
          <option value="">All types</option>
        </select>
      </div>
    </div>

    <!-- Results -->
    <div id="results" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>

    <!-- Pagination -->
    <div id="pagination" class="flex justify-center items-center gap-3 mt-8 hidden">
      <button id="prevBtn" onclick="changePage(-1)" class="px-4 py-2 text-sm border border-slate-200 rounded bg-white hover:bg-slate-50 disabled:opacity-40 transition-colors">← Prev</button>
      <span id="pageLabel" class="text-sm text-slate-500"></span>
      <button id="nextBtn" onclick="changePage(1)" class="px-4 py-2 text-sm border border-slate-200 rounded bg-white hover:bg-slate-50 disabled:opacity-40 transition-colors">Next →</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    const PAGE_SIZE = 18
    let currentPage = 1
    let totalCount = 0

    async function init() {
      const user = await requireAuth()
      if (!user) return
      document.getElementById('nav').innerHTML = navHTML('questions.html')

      const subjectSel = document.getElementById('fSubject')
      SUBJECTS.forEach(s => { const o = document.createElement('option'); o.value = s.value; o.textContent = s.label; subjectSel.appendChild(o) })

      const gradeSel = document.getElementById('fGrade')
      GRADE_LEVELS.forEach(g => { const o = document.createElement('option'); o.value = g.value; o.textContent = g.label; gradeSel.appendChild(o) })

      const diffSel = document.getElementById('fDifficulty')
      DIFFICULTY_LEVELS.forEach(d => { const o = document.createElement('option'); o.value = d.value; o.textContent = `${d.value} — ${d.label}`; diffSel.appendChild(o) })

      const typeSel = document.getElementById('fType')
      QUESTION_TYPES.forEach(t => { const o = document.createElement('option'); o.value = t.value; o.textContent = t.label; typeSel.appendChild(o) })

      const params = new URLSearchParams(window.location.search)
      if (params.get('subject')) document.getElementById('fSubject').value = params.get('subject')

      loadQuestions()
    }

    async function loadQuestions(page = 1) {
      currentPage = page
      const search     = document.getElementById('searchInput').value.trim()
      const subject    = document.getElementById('fSubject').value
      const grade      = document.getElementById('fGrade').value
      const difficulty = document.getElementById('fDifficulty').value
      const type       = document.getElementById('fType').value

      document.getElementById('results').innerHTML = '<p class="col-span-3 text-center text-slate-400 py-12 text-sm">Loading…</p>'

      let query = db.from('questions')
        .select('id,question_code,title,content,subject,grade_level,difficulty,question_type,tags,created_at', { count: 'exact' })
        .eq('is_active', true)
        .order('created_at', { ascending: false })
        .range((page - 1) * PAGE_SIZE, page * PAGE_SIZE - 1)

      if (search)     query = query.or(`title.ilike.%${search}%,content.ilike.%${search}%,question_code.ilike.%${search}%`)
      if (subject)    query = query.eq('subject', subject)
      if (grade)      query = query.eq('grade_level', grade)
      if (difficulty) query = query.eq('difficulty', parseInt(difficulty))
      if (type)       query = query.eq('question_type', type)

      const { data, count, error } = await query
      totalCount = count || 0

      document.getElementById('totalLabel').textContent = `${totalCount} question${totalCount !== 1 ? 's' : ''} in the bank`

      if (error || !data?.length) {
        document.getElementById('results').innerHTML = `
          <div class="col-span-3 text-center py-16">
            <p class="text-slate-400 text-sm mb-4">No questions found</p>
            <div class="flex justify-center gap-3">
              <a href="question-form.html" class="px-4 py-2 bg-indigo-700 text-white rounded text-sm font-medium hover:bg-indigo-800">Add Question</a>
              <a href="generate.html" class="px-4 py-2 border border-slate-200 text-slate-700 rounded text-sm font-medium hover:bg-slate-50">AI Generate</a>
            </div>
          </div>`
        document.getElementById('pagination').classList.add('hidden')
        return
      }

      document.getElementById('results').innerHTML = data.map(q => `
        <div class="q-card">
          <div class="flex items-start justify-between gap-2">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-1.5 flex-wrap mb-1.5">
                <span class="font-mono text-xs text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded-sm border border-slate-100">${q.question_code}</span>
                ${subjectBadge(q.subject)}
                ${difficultyBadge(q.difficulty)}
              </div>
              <h3 class="font-semibold text-slate-900 text-sm leading-snug line-clamp-1">${q.title}</h3>
            </div>
            <div class="flex items-center gap-0.5 shrink-0">
              <a href="question-form.html?id=${q.id}" class="p-1.5 rounded text-slate-300 hover:text-indigo-600 hover:bg-indigo-50 transition-colors" title="Edit">✏️</a>
              <button onclick="deleteQuestion('${q.id}', this)" class="p-1.5 rounded text-slate-300 hover:text-red-500 hover:bg-red-50 transition-colors" title="Delete">🗑️</button>
            </div>
          </div>
          <p class="text-sm text-slate-500 line-clamp-2 leading-relaxed">${q.content}</p>
          <div class="flex items-center justify-between flex-wrap gap-1 pt-2 border-t border-slate-50 text-xs text-slate-400">
            <span>${getGradeLabel(q.grade_level)} · ${getTypeLabel(q.question_type)}</span>
            <span>${formatDate(q.created_at)}</span>
          </div>
          ${q.tags?.length ? `<div class="flex flex-wrap gap-1">${q.tags.slice(0,4).map(t => `<span class="text-xs bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-sm">${t}</span>`).join('')}</div>` : ''}
        </div>`).join('')

      const totalPages = Math.ceil(totalCount / PAGE_SIZE)
      if (totalPages > 1) {
        document.getElementById('pagination').classList.remove('hidden')
        document.getElementById('pageLabel').textContent = `Page ${page} of ${totalPages}`
        document.getElementById('prevBtn').disabled = page === 1
        document.getElementById('nextBtn').disabled = page === totalPages
      } else {
        document.getElementById('pagination').classList.add('hidden')
      }
    }

    function changePage(dir) { loadQuestions(currentPage + dir) }

    async function deleteQuestion(id, btn) {
      if (!confirm('Remove this question from the bank?')) return
      btn.disabled = true
      const { error } = await db.from('questions').update({ is_active: false }).eq('id', id)
      if (error) { alert('Failed to delete'); btn.disabled = false; return }
      loadQuestions(currentPage)
    }

    init()
  </script>
</body>
</html>
