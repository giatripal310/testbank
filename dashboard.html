<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TestBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .stat-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 24px; }
    .q-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 18px 20px; transition: box-shadow .15s; }
    .q-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 3px; font-size: .6875rem; font-weight: 500; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="nav"></div>

  <div class="max-w-screen-xl mx-auto px-6 py-10">

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Dashboard</h1>
      <p class="text-sm text-slate-500 mt-1" id="greeting"></p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
      <div class="stat-card">
        <div class="text-xs font-medium text-slate-400 uppercase tracking-wide mb-2">Total Questions</div>
        <div class="text-3xl font-bold text-slate-900" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="text-xs font-medium text-slate-400 uppercase tracking-wide mb-2">Subjects</div>
        <div class="text-3xl font-bold text-slate-900" id="statSubjects">—</div>
      </div>
      <div class="stat-card">
        <div class="text-xs font-medium text-slate-400 uppercase tracking-wide mb-2">Saved Tests</div>
        <div class="text-3xl font-bold text-slate-900" id="statTests">—</div>
      </div>
      <div class="stat-card">
        <div class="text-xs font-medium text-slate-400 uppercase tracking-wide mb-2">Added This Month</div>
        <div class="text-3xl font-bold text-slate-900" id="statMonth">—</div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

      <!-- Recent questions -->
      <div class="lg:col-span-2">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-semibold text-slate-700 uppercase tracking-wide">Recent Questions</h2>
          <a href="questions.html" class="text-xs text-indigo-600 font-medium hover:text-indigo-800">View all →</a>
        </div>
        <div id="recentList" class="space-y-3">
          <div class="q-card text-sm text-slate-400">Loading…</div>
        </div>
      </div>

      <!-- Quick actions + subject breakdown -->
      <div class="space-y-6">
        <div>
          <div class="text-sm font-semibold text-slate-700 uppercase tracking-wide mb-4">Quick Actions</div>
          <div class="space-y-2">
            <a href="question-form.html" class="flex items-center gap-3 px-4 py-3 bg-indigo-700 text-white rounded-md text-sm font-medium hover:bg-indigo-800 transition-colors">
              <span>＋</span> Add a Question
            </a>
            <a href="test-builder.html" class="flex items-center gap-3 px-4 py-3 bg-white border border-slate-200 text-slate-700 rounded-md text-sm font-medium hover:bg-slate-50 transition-colors">
              <span>📋</span> Build a Test
            </a>
            <a href="generate.html" class="flex items-center gap-3 px-4 py-3 bg-white border border-slate-200 text-slate-700 rounded-md text-sm font-medium hover:bg-slate-50 transition-colors">
              <span>✦</span> AI Generate
            </a>
            <a href="questions.html" class="flex items-center gap-3 px-4 py-3 bg-white border border-slate-200 text-slate-700 rounded-md text-sm font-medium hover:bg-slate-50 transition-colors">
              <span>🔍</span> Search Questions
            </a>
          </div>
        </div>

        <div>
          <div class="text-sm font-semibold text-slate-700 uppercase tracking-wide mb-4">By Subject</div>
          <div id="subjectBreakdown" class="space-y-2">
            <div class="text-sm text-slate-400">Loading…</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    async function init() {
      const user = await requireAuth()
      if (!user) return
      document.getElementById('nav').innerHTML = navHTML('dashboard.html')

      const name = user.user_metadata?.full_name?.split(' ')[0] || 'there'
      const hour = new Date().getHours()
      const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening'
      document.getElementById('greeting').textContent = `${greeting}, ${name}.`

      loadStats(user)
      loadRecent()
    }

    async function loadStats(user) {
      const now = new Date()
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString()

      const [{ count: total }, { count: monthCount }, { data: subjects }, { count: tests }] = await Promise.all([
        db.from('questions').select('*', { count: 'exact', head: true }).eq('is_active', true),
        db.from('questions').select('*', { count: 'exact', head: true }).eq('is_active', true).gte('created_at', monthStart),
        db.from('questions').select('subject').eq('is_active', true),
        db.from('tests').select('*', { count: 'exact', head: true }).eq('is_active', true),
      ])

      document.getElementById('statTotal').textContent = total ?? '0'
      document.getElementById('statMonth').textContent = monthCount ?? '0'
      document.getElementById('statTests').textContent = tests ?? '0'

      const uniqueSubjects = new Set((subjects || []).map(r => r.subject))
      document.getElementById('statSubjects').textContent = uniqueSubjects.size

      // Subject breakdown
      const counts = {}
      ;(subjects || []).forEach(r => { counts[r.subject] = (counts[r.subject] || 0) + 1 })
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6)
      const max = sorted[0]?.[1] || 1

      document.getElementById('subjectBreakdown').innerHTML = sorted.length ? sorted.map(([sub, cnt]) => {
        const s = getSubject(sub)
        const c = SUBJECT_COLORS[s.color] || SUBJECT_COLORS.gray
        const pct = Math.round((cnt / max) * 100)
        return `
          <div>
            <div class="flex items-center justify-between mb-1">
              <span class="text-xs font-medium text-slate-600">${s.label}</span>
              <span class="text-xs text-slate-400">${cnt}</span>
            </div>
            <div style="height:4px;background:#f1f5f9;border-radius:2px">
              <div style="height:4px;width:${pct}%;background:${c.text};border-radius:2px;transition:width .5s"></div>
            </div>
          </div>`
      }).join('') : '<div class="text-sm text-slate-400">No questions yet.</div>'
    }

    async function loadRecent() {
      const { data } = await db.from('questions')
        .select('id,question_code,title,subject,difficulty,question_type,created_at')
        .eq('is_active', true)
        .order('created_at', { ascending: false })
        .limit(8)

      if (!data?.length) {
        document.getElementById('recentList').innerHTML = `
          <div class="q-card text-sm text-slate-400 text-center py-8">
            No questions yet. <a href="question-form.html" class="text-indigo-600 font-medium">Add the first one →</a>
          </div>`
        return
      }

      document.getElementById('recentList').innerHTML = data.map(q => `
        <a href="question-form.html?id=${q.id}" class="q-card flex items-start gap-4 no-underline block">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1 flex-wrap">
              <span class="font-mono text-xs text-slate-400">${q.question_code}</span>
              ${subjectBadge(q.subject)}
              ${difficultyBadge(q.difficulty)}
            </div>
            <p class="text-sm font-medium text-slate-800 truncate">${q.title}</p>
            <p class="text-xs text-slate-400 mt-0.5">${getTypeLabel(q.question_type)} · ${formatDate(q.created_at)}</p>
          </div>
          <span class="text-slate-300 text-lg mt-0.5">›</span>
        </a>`).join('')
    }

    init()
  </script>
</body>
</html>
