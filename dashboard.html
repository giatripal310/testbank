<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — School Test Bank</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div id="nav"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900" id="welcome">Welcome back! 👋</h1>
      <p class="text-gray-500 mt-1 text-sm">Your school-wide question bank at a glance.</p>
    </div>

    <!-- Quick actions -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <a href="question-form.html" class="flex items-center gap-3 bg-indigo-600 text-white p-4 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm">
        <div class="p-2 bg-white/20 rounded-lg text-xl">+</div>
        <div><p class="font-semibold">Add Question</p><p class="text-xs text-indigo-200">Write a new question manually</p></div>
      </a>
      <a href="generate.html" class="flex items-center gap-3 bg-violet-600 text-white p-4 rounded-xl hover:bg-violet-700 transition-colors shadow-sm">
        <div class="p-2 bg-white/20 rounded-lg text-xl">✨</div>
        <div><p class="font-semibold">AI Generate</p><p class="text-xs text-violet-200">Let AI draft questions for you</p></div>
      </a>
      <a href="questions.html" class="flex items-center gap-3 bg-white border border-gray-200 text-gray-800 p-4 rounded-xl hover:bg-gray-50 transition-colors shadow-sm">
        <div class="p-2 bg-gray-100 rounded-lg text-xl">🔍</div>
        <div><p class="font-semibold">Browse Bank</p><p class="text-xs text-gray-400">Search & filter all questions</p></div>
      </a>
    </div>

    <!-- Stats + Subject breakdown -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
      <div class="bg-white rounded-xl border border-gray-200 p-6 flex items-center gap-4">
        <div class="p-3 bg-indigo-50 rounded-xl text-3xl">📊</div>
        <div>
          <p class="text-3xl font-bold text-gray-900" id="totalCount">—</p>
          <p class="text-sm text-gray-500">Total questions</p>
        </div>
      </div>
      <div class="lg:col-span-2 bg-white rounded-xl border border-gray-200 p-6">
        <h2 class="text-sm font-semibold text-gray-700 mb-4">Questions by Subject</h2>
        <div id="subjectGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-2">
          <p class="text-sm text-gray-400 col-span-3">Loading…</p>
        </div>
      </div>
    </div>

    <!-- Recent questions -->
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-gray-700">Recently Added</h2>
        <a href="questions.html" class="text-xs text-indigo-600 hover:underline">View all →</a>
      </div>
      <div id="recentList">
        <p class="text-sm text-gray-400 py-4 text-center">Loading…</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    async function init() {
      const user = await requireAuth()
      if (!user) return

      // Nav
      document.getElementById('nav').innerHTML = navHTML('dashboard.html')

      // Welcome
      const { data: profile } = await db.from('profiles').select('full_name').eq('id', user.id).single()
      const name = profile?.full_name?.split(' ')[0] || ''
      if (name) document.getElementById('welcome').textContent = `Welcome back, ${name}! 👋`

      // Total count
      const { count } = await db.from('questions').select('*', { count: 'exact', head: true }).eq('is_active', true)
      document.getElementById('totalCount').textContent = count ?? 0

      // Subject breakdown
      const { data: rows } = await db.from('questions').select('subject').eq('is_active', true)
      const counts = {}
      rows?.forEach(r => { counts[r.subject] = (counts[r.subject] || 0) + 1 })
      const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6)

      if (top.length === 0) {
        document.getElementById('subjectGrid').innerHTML = '<p class="text-sm text-gray-400 col-span-3">No questions yet.</p>'
      } else {
        document.getElementById('subjectGrid').innerHTML = top.map(([subj, cnt]) => {
          const s = getSubject(subj)
          const c = SUBJECT_COLORS[s.color] || SUBJECT_COLORS.gray
          return `<a href="questions.html?subject=${subj}" style="background:${c.bg};color:${c.text}"
            class="flex items-center justify-between px-3 py-2 rounded-lg text-xs font-medium hover:opacity-80">
            <span>${s.label}</span><span class="font-bold">${cnt}</span></a>`
        }).join('')
      }

      // Recent questions
      const { data: recent } = await db.from('questions')
        .select('id,question_code,title,subject,difficulty,created_at')
        .eq('is_active', true)
        .order('created_at', { ascending: false })
        .limit(8)

      if (!recent?.length) {
        document.getElementById('recentList').innerHTML = `
          <div class="text-center py-8">
            <p class="text-gray-400 text-sm mb-2">No questions yet.</p>
            <a href="question-form.html" class="text-sm text-indigo-600 hover:underline">Add the first one →</a>
          </div>`
      } else {
        document.getElementById('recentList').innerHTML = recent.map(q => `
          <a href="question-form.html?id=${q.id}"
            class="flex items-center gap-3 py-2.5 px-2 hover:bg-gray-50 rounded-lg transition-colors border-b border-gray-50 last:border-0">
            <span class="font-mono text-xs text-gray-400 w-36 shrink-0 truncate">${q.question_code}</span>
            <span class="flex-1 text-sm text-gray-800 truncate">${q.title}</span>
            <span class="shrink-0 hidden sm:block">${subjectBadge(q.subject)}</span>
            <span class="shrink-0">${difficultyBadge(q.difficulty)}</span>
            <span class="text-xs text-gray-400 shrink-0 hidden md:block">${formatDate(q.created_at)}</span>
          </a>`).join('')
      }
    }

    init()
  </script>
</body>
</html>
