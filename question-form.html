<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Form — TestBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .inp { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: .5rem .75rem; font-size: .875rem; background: #fff; color: #0f172a; font-family: inherit; transition: border-color .15s, box-shadow .15s; }
    .inp:focus { outline: none; border-color: #4338ca; box-shadow: 0 0 0 3px rgba(67,56,202,.1); }
    .field-label { display: block; font-size: .8125rem; font-weight: 500; color: #475569; margin-bottom: 5px; }
    .sec-label { font-size: .6875rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="nav"></div>

  <div class="max-w-2xl mx-auto px-6 py-10">
    <div class="flex items-center gap-3 mb-6">
      <a href="questions.html" class="text-sm text-slate-400 hover:text-slate-600 transition-colors">← Back</a>
      <h1 id="pageTitle" class="text-2xl font-bold text-slate-900 tracking-tight">Add New Question</h1>
    </div>

    <div class="bg-white border border-slate-200 rounded-lg p-6 space-y-6">
      <div id="errorMsg" class="hidden p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded"></div>

      <!-- Identification -->
      <div>
        <div class="sec-label">Identification</div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div>
            <label class="field-label">Question Code *</label>
            <input id="fCode" type="text" class="inp font-mono" placeholder="MATH-G3-001" required />
            <p class="text-xs text-slate-400 mt-1">Auto-generated · editable</p>
          </div>
          <div class="sm:col-span-2">
            <label class="field-label">Question Title *</label>
            <input id="fTitle" type="text" class="inp" placeholder="Short descriptive name" required />
          </div>
        </div>
      </div>

      <!-- Classification -->
      <div>
        <div class="sec-label">Classification</div>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div>
            <label class="field-label">Subject *</label>
            <select id="fSubject" class="inp" onchange="updateCode()"><option value="">Select…</option></select>
          </div>
          <div>
            <label class="field-label">Grade *</label>
            <select id="fGrade" class="inp" onchange="updateCode()"><option value="">Select…</option></select>
          </div>
          <div>
            <label class="field-label">Difficulty *</label>
            <select id="fDifficulty" class="inp"><option value="">Select…</option></select>
          </div>
          <div>
            <label class="field-label">Type *</label>
            <select id="fType" class="inp" onchange="renderAnswerSection()"><option value="">Select…</option></select>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div>
        <div class="sec-label">Content</div>
        <div class="space-y-4">
          <div>
            <label class="field-label">Question Content *</label>
            <textarea id="fContent" rows="4" class="inp resize-y" placeholder="Type the full question here. Use ___ for fill-in-the-blank."></textarea>
          </div>
          <div id="answerSection"></div>
          <div>
            <label class="field-label">Explanation / Answer Key Notes</label>
            <textarea id="fExplanation" rows="3" class="inp resize-y" placeholder="Explain the correct answer — visible to teachers only."></textarea>
          </div>
        </div>
      </div>

      <!-- Metadata -->
      <div>
        <div class="sec-label">Metadata</div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="field-label">Curriculum Reference</label>
            <input id="fCurriculum" type="text" class="inp" placeholder="e.g. CCSS.MATH.3.OA.A.1" />
          </div>
          <div>
            <label class="field-label">Tags (comma-separated)</label>
            <input id="fTags" type="text" class="inp" placeholder="fractions, word problem, visual" />
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3 pt-2 border-t border-slate-100">
        <button id="saveBtn" onclick="saveQuestion()"
          class="flex items-center gap-2 bg-indigo-700 text-white px-5 py-2.5 rounded text-sm font-semibold hover:bg-indigo-800 transition-colors disabled:opacity-60">
          Save Question
        </button>
        <a href="questions.html" class="px-4 py-2.5 text-sm text-slate-400 hover:text-slate-600 transition-colors">Cancel</a>
        <div id="deleteArea" class="ml-auto hidden">
          <button onclick="deleteQuestion()" class="text-sm text-red-400 hover:text-red-600 transition-colors">Delete question</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    let editId = null
    let currentUser = null

    async function init() {
      currentUser = await requireAuth()
      if (!currentUser) return
      document.getElementById('nav').innerHTML = navHTML('question-form.html')

      const subj = document.getElementById('fSubject')
      SUBJECTS.forEach(s => { const o = document.createElement('option'); o.value = s.value; o.textContent = s.label; subj.appendChild(o) })

      const grade = document.getElementById('fGrade')
      GRADE_LEVELS.forEach(g => { const o = document.createElement('option'); o.value = g.value; o.textContent = g.label; grade.appendChild(o) })

      const diff = document.getElementById('fDifficulty')
      DIFFICULTY_LEVELS.forEach(d => { const o = document.createElement('option'); o.value = d.value; o.textContent = `${d.value} — ${d.label}`; diff.appendChild(o) })

      const type = document.getElementById('fType')
      QUESTION_TYPES.forEach(t => { const o = document.createElement('option'); o.value = t.value; o.textContent = t.label; type.appendChild(o) })

      const params = new URLSearchParams(window.location.search)
      editId = params.get('id')
      if (editId) {
        document.getElementById('pageTitle').textContent = 'Edit Question'
        document.getElementById('deleteArea').classList.remove('hidden')
        await loadQuestion(editId)
      } else {
        document.getElementById('fType').value = 'multiple_choice'
        document.getElementById('fDifficulty').value = '2'
        renderAnswerSection()
      }
    }

    async function loadQuestion(id) {
      const { data: q, error } = await db.from('questions').select('*').eq('id', id).single()
      if (error || !q) { alert('Question not found'); window.location.href = 'questions.html'; return }
      document.getElementById('fCode').value        = q.question_code
      document.getElementById('fTitle').value       = q.title
      document.getElementById('fContent').value     = q.content
      document.getElementById('fSubject').value     = q.subject
      document.getElementById('fGrade').value       = q.grade_level
      document.getElementById('fDifficulty').value  = q.difficulty
      document.getElementById('fType').value        = q.question_type
      document.getElementById('fExplanation').value = q.explanation || ''
      document.getElementById('fCurriculum').value  = q.curriculum_reference || ''
      document.getElementById('fTags').value        = (q.tags || []).join(', ')
      renderAnswerSection(q)
    }

    function renderAnswerSection(q = null) {
      const type = document.getElementById('fType').value
      const sec  = document.getElementById('answerSection')
      if (type === 'multiple_choice') {
        const opts = q?.options || [
          { id: 'A', text: '', is_correct: false },
          { id: 'B', text: '', is_correct: false },
          { id: 'C', text: '', is_correct: false },
          { id: 'D', text: '', is_correct: false },
        ]
        sec.innerHTML = `
          <div>
            <label class="field-label">Answer Options <span style="color:#94a3b8;font-weight:400">(mark the correct one)</span></label>
            <div class="space-y-2">
              ${opts.map(o => `
                <div class="flex items-center gap-3">
                  <input type="radio" name="correct" value="${o.id}" ${o.is_correct ? 'checked' : ''} class="w-4 h-4 accent-indigo-600 shrink-0" />
                  <span class="w-4 text-xs font-bold text-slate-400 shrink-0">${o.id}</span>
                  <input type="text" value="${o.text}" placeholder="Option ${o.id}" class="inp" id="opt${o.id}" />
                </div>`).join('')}
            </div>
            <p class="text-xs text-slate-400 mt-1.5">Click the radio button next to the correct answer.</p>
          </div>`
      } else if (type === 'true_false') {
        sec.innerHTML = `
          <div>
            <label class="field-label">Correct Answer</label>
            <select id="fAnswer" class="inp" style="max-width:180px">
              <option value="">Select…</option>
              <option value="True"  ${q?.correct_answer === 'True'  ? 'selected' : ''}>True</option>
              <option value="False" ${q?.correct_answer === 'False' ? 'selected' : ''}>False</option>
            </select>
          </div>`
      } else if (['short_answer', 'essay', 'fill_blank'].includes(type)) {
        const label = type === 'fill_blank' ? 'Correct word / phrase for the blank' : 'Model answer / answer key'
        sec.innerHTML = `
          <div>
            <label class="field-label">${label}</label>
            <textarea id="fAnswer" rows="${type === 'essay' ? 5 : 2}" class="inp resize-y" placeholder="${type === 'fill_blank' ? 'e.g. photosynthesis' : 'Expected answer…'}">${q?.correct_answer || ''}</textarea>
          </div>`
      } else {
        sec.innerHTML = ''
      }
    }

    async function updateCode() {
      if (editId) return
      const subject = document.getElementById('fSubject').value
      const grade   = document.getElementById('fGrade').value
      if (!subject || !grade) return
      const prefix = subject.replace('_','').slice(0,4).toUpperCase() + '-G' + grade + '-'
      const { data } = await db.from('questions').select('question_code').ilike('question_code', prefix + '%')
      const nums = (data || []).map(r => parseInt(r.question_code.split('-').pop()) || 0)
      const next = (Math.max(0, ...nums) + 1).toString().padStart(3, '0')
      document.getElementById('fCode').value = prefix + next
    }

    async function saveQuestion() {
      const btn = document.getElementById('saveBtn')
      btn.disabled = true; btn.textContent = 'Saving…'

      const type    = document.getElementById('fType').value
      const code    = document.getElementById('fCode').value.trim()
      const title   = document.getElementById('fTitle').value.trim()
      const content = document.getElementById('fContent').value.trim()
      const subject = document.getElementById('fSubject').value
      const grade   = document.getElementById('fGrade').value
      const diff    = parseInt(document.getElementById('fDifficulty').value)

      if (!code || !title || !content || !subject || !grade || !diff || !type) {
        showError('Please fill in all required fields.')
        btn.disabled = false; btn.textContent = 'Save Question'; return
      }

      let options = null, correctAnswer = ''
      if (type === 'multiple_choice') {
        const radios = document.querySelectorAll('input[name="correct"]')
        let correctId = ''
        radios.forEach(r => { if (r.checked) correctId = r.value })
        options = ['A','B','C','D'].map(id => ({ id, text: document.getElementById('opt' + id)?.value || '', is_correct: id === correctId }))
        correctAnswer = correctId
      } else {
        correctAnswer = document.getElementById('fAnswer')?.value || ''
      }

      const payload = {
        question_code: code.toUpperCase(), title, content,
        question_type: type, subject, grade_level: grade, difficulty: diff,
        options, correct_answer: correctAnswer,
        explanation: document.getElementById('fExplanation').value.trim(),
        curriculum_reference: document.getElementById('fCurriculum').value.trim(),
        tags: document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean),
        updated_by: currentUser.id,
      }

      let error
      if (editId) {
        const res = await db.from('questions').update(payload).eq('id', editId)
        error = res.error
      } else {
        payload.created_by = currentUser.id
        const res = await db.from('questions').insert(payload)
        error = res.error
      }

      if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Save Question'; return }
      window.location.href = 'questions.html'
    }

    async function deleteQuestion() {
      if (!confirm('Remove this question from the bank?')) return
      const { error } = await db.from('questions').update({ is_active: false }).eq('id', editId)
      if (error) { alert('Failed: ' + error.message); return }
      window.location.href = 'questions.html'
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg')
      el.textContent = msg; el.classList.remove('hidden')
      el.scrollIntoView({ behavior: 'smooth' })
    }

    init()
  </script>
</body>
</html>
