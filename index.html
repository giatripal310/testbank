<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TestBank — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 48px 48px 40px; width: 100%; max-width: 400px; text-align: center; }
    .logo { font-size: 2rem; margin-bottom: 20px; }
    .brand { font-size: 1.5rem; font-weight: 700; color: #0f172a; letter-spacing: -.03em; margin-bottom: 8px; }
    .tagline { font-size: .875rem; color: #64748b; line-height: 1.6; margin-bottom: 36px; }
    .divider { border: none; border-top: 1px solid #e2e8f0; margin: 0 0 28px; }
    .btn-google { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 11px 16px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fff; font-size: .875rem; font-weight: 500; color: #1e293b; cursor: pointer; font-family: inherit; transition: background .15s, border-color .15s; }
    .btn-google:hover { background: #f8fafc; border-color: #cbd5e1; }
    .note { font-size: .75rem; color: #94a3b8; margin-top: 20px; line-height: 1.6; }
    #status { font-size: .8125rem; color: #64748b; margin-top: 14px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📚</div>
    <div class="brand">TestBank</div>
    <p class="tagline">A shared question bank for K–12 teachers.<br>Build, search, and generate assessments together.</p>
    <hr class="divider">
    <button class="btn-google" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>
    <div id="status"></div>
    <p class="note">Sign in with your school Google account.<br>Access is open to all verified teachers.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    async function init() {
      const { data: { session } } = await db.auth.getSession()
      if (session) window.location.href = 'dashboard.html'
    }

    async function signIn() {
      document.getElementById('status').textContent = 'Redirecting to Google…'
      const base = window.location.href.replace(/\/[^/]*$/, '')
      const { error } = await db.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: base + '/dashboard.html' }
      })
      if (error) document.getElementById('status').textContent = 'Error: ' + error.message
    }

    init()
  </script>
</body>
</html>
