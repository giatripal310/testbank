<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tests — TestBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .t-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 18px 20px; transition: box-shadow .15s; }
    .t-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.07); }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="nav"></div>

  <div class="max-w-screen-xl mx-auto px-6 py-10">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Tests</h1>
        <p class="text-sm text-slate-500 mt-1" id="totalLabel">Loading…</p>
      </div>
      <a href="test-builder.html" class="flex items-center gap-1.5 px-4 py-2 bg-indigo-700 text-white rounded text-sm font-medium hover:bg-indigo-800 transition-colors">
        + Build a Test
      </a>
    </div>

    <div id="testList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      <div class="t-card text-sm text-slate-400">Loading…</div>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden text-center py-20">
      <div class="text-4xl mb-4">📋</div>
      <p class="text-slate-500 text-base font-medium mb-1">No tests yet</p>
      <p class="text-slate-400 text-sm mb-6">Build your first test by selecting questions from the bank.</p>
      <a href="test-builder.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-700 text-white rounded text-sm font-medium hover:bg-indigo-800 transition-colors">
        + Build a Test
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    async function init() {
      const user = await requireAuth()
      if (!user) return
      document.getElementById('nav').innerHTML = navHTML('tests.html')
      loadTests()
    }

    async function loadTests() {
      const { data, count, error } = await db.from('tests')
        .select('*', { count: 'exact' })
        .eq('is_active', true)
        .order('created_at', { ascending: false })

      document.getElementById('totalLabel').textContent = `${count ?? 0} saved test${count !== 1 ? 's' : ''}`

      if (error || !data?.length) {
        document.getElementById('testList').classList.add('hidden')
        document.getElementById('emptyState').classList.remove('hidden')
        return
      }

      document.getElementById('testList').innerHTML = data.map(t => `
        <div class="t-card flex flex-col gap-3">
          <div class="flex items-start justify-between gap-2">
            <div class="flex-1 min-w-0">
              <span class="font-mono text-xs text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded-sm border border-slate-100">${t.test_code}</span>
              <h3 class="font-semibold text-slate-900 mt-1.5 leading-snug">${t.title}</h3>
              ${t.description ? `<p class="text-sm text-slate-500 mt-0.5 line-clamp-1">${t.description}</p>` : ''}
            </div>
          </div>
          <div class="flex items-center gap-3 text-xs text-slate-400">
            ${t.subject ? `<span>${getSubject(t.subject).label}</span>` : ''}
            ${t.grade_level ? `<span>Grade ${t.grade_level}</span>` : ''}
            <span>${(t.question_ids || []).length} question${(t.question_ids||[]).length !== 1 ? 's' : ''}</span>
            <span class="ml-auto">${formatDate(t.created_at)}</span>
          </div>
          <div class="flex items-center gap-2 pt-2 border-t border-slate-50">
            <a href="test-view.html?id=${t.id}" target="_blank"
              class="flex-1 text-center px-3 py-1.5 border border-slate-200 text-slate-700 rounded text-xs font-medium hover:bg-slate-50 transition-colors">
              🖨️ Print / View
            </a>
            <a href="test-builder.html?id=${t.id}"
              class="flex-1 text-center px-3 py-1.5 border border-slate-200 text-slate-700 rounded text-xs font-medium hover:bg-slate-50 transition-colors">
              ✏️ Edit
            </a>
            <button onclick="deleteTest('${t.id}', this)"
              class="px-3 py-1.5 border border-slate-200 text-red-400 rounded text-xs font-medium hover:bg-red-50 hover:border-red-200 transition-colors">
              🗑️
            </button>
          </div>
        </div>`).join('')
    }

    async function deleteTest(id, btn) {
      if (!confirm('Delete this test?')) return
      btn.disabled = true
      const { error } = await db.from('tests').update({ is_active: false }).eq('id', id)
      if (error) { alert('Failed: ' + error.message); btn.disabled = false; return }
      loadTests()
    }

    init()
  </script>
</body>
</html>
